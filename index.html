<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obasty Marketplace | Designs & Tech</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <h1 class="logo">Obasty<span>.com</span></h1>
            <div class="search-bar">
                <input type="text" placeholder="Search for designs, laptops, or services...">
                <button>Search</button>
            </div>
        </div>
    </nav>

    <section class="categories container">
        <div class="category-item">Graphic Design</div>
        <div class="category-item">Laptop Repair</div>
        <div class="category-item">Programming</div>
        <div class="category-item">Education</div>
    </section>

    <main class="container">
        <h2 class="section-title">Fresh Recommendations</h2>
        <div class="product-grid">
            
            <div class="card">
                <div class="card-image" style="background-image: url('https://via.placeholder.com/300x200');"></div>
                <div class="card-info">
                    <p class="price">GH₵ 150</p>
                    <h3 class="title">Professional Event Flyer Design</h3>
                    <p class="location">Accra, Ghana</p>
                </div>
            </div>

            <div class="card">
                <div class="card-image" style="background-image: url('https://via.placeholder.com/300x200');"></div>
                <div class="card-info">
                    <p class="price">GH₵ 2,500</p>
                    <h3 class="title">Toshiba Core i5 Laptop - Clean</h3>
                    <p class="location">Kumasi, Ghana</p>
                </div>
            </div>

            </div>
    </main>

</body>
</html>
