<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tonaton Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="top-nav">
        <div class="menu-icon"><i class="fas fa-bars"></i></div>
        <div class="logo">tonaton</div>
        <div class="nav-right">
            <i class="fas fa-search"></i>
            <i class="fas fa-user"></i>
        </div>
    </header>

    <section class="hero">
        <div class="search-container">
            <input type="text" placeholder="What are you looking for?">
            <button><i class="fas fa-search"></i></button>
        </div>
    </section>

    <div class="container">
        <div class="section-header">
            <h3>Browse categories</h3>
            <a href="#">See all</a>
        </div>
        <div class="category-grid">
            <div class="cat-card"><i class="fas fa-car"></i><span>Vehicles</span></div>
            <div class="cat-card"><i class="fas fa-home"></i><span>Property</span></div>
            <div class="cat-card"><i class="fas fa-mobile-alt"></i><span>Electronics</span></div>
            <div class="cat-card"><i class="fas fa-tshirt"></i><span>Fashion</span></div>
        </div>

        <div class="section-header">
            <h3>Promoted Ads</h3>
        </div>
        <div class="ad-list">
            <div class="ad-item">
                <div class="ad-image" style="background-image: url('https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=200&auto=format&fit=crop');"></div>
                <div class="ad-details">
                    <p class="ad-title">Samsung Galaxy S22 Ultra</p>
                    <p class="ad-location">Accra, Mobile Phones</p>
                    <p class="ad-price">GH₵ 5,500</p>
                    <span class="badge">MEMBER</span>
                </div>
            </div>
            
            <div class="ad-item">
                <div class="ad-image" style="background-image: url('https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?q=80&w=200&auto=format&fit=crop');"></div>
                <div class="ad-details">
                    <p class="ad-title">Toyota Corolla 2015</p>
                    <p class="ad-location">Kumasi, Cars</p>
                    <p class="ad-price">GH₵ 85,000</p>
                    <span class="badge">TOP AD</span>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="active"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="#"><i class="fas fa-list"></i><span>Ads</span></a>
        <a href="#" class="post-plus"><i class="fas fa-plus-circle"></i><span>Post Ad</span></a>
        <a href="#"><i class="fas fa-comment"></i><span>Chat</span></a>
        <a href="#"><i class="fas fa-user"></i><span>My Account</span></a>
    </nav>

</body>
</html>
