<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumia Clone | Online Shopping</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="container navbar">
            <div class="logo">SHOP<span>EASE</span></div>
            <div class="search-bar">
                <input type="text" placeholder="Search products, brands and categories">
                <button>SEARCH</button>
            </div>
            <div class="user-menu">
                <a href="#"><i class="fa-regular fa-user"></i> Account</a>
                <a href="#"><i class="fa-solid fa-cart-shopping"></i> Cart</a>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="product-section">
            <h2>Top Selling Items</h2>
            <div class="product-grid">
                <div class="product-card">
                    <div class="badge">Off 20%</div>
                    <img src="https://via.placeholder.com/200" alt="Product Name">
                    <div class="info">
                        <h3>Wireless Bluetooth Headphones</h3>
                        <p class="price">₵ 150.00</p>
                        <p class="old-price">₵ 190.00</p>
                    </div>
                    <button class="add-to-cart">ADD TO CART</button>
                </div>

                <div class="product-card">
                    <img src="https://via.placeholder.com/200" alt="Product Name">
                    <div class="info">
                        <h3>Smart Watch Series 7</h3>
                        <p class="price">₵ 450.00</p>
                    </div>
                    <button class="add-to-cart">ADD TO CART</button>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
