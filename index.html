<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obasty Market | Buy & Sell</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

   <div class="container main-layout">
    
    <aside class="sidebar">
        <ul class="category-list">
            <li><a href="#"><i class="fa-solid fa-apple-whole"></i> Supermarket</a></li>
            <li><a href="#"><i class="fa-solid fa-mobile-screen"></i> Phones & Tablets</a></li>
            <li><a href="#"><i class="fa-solid fa-tv"></i> Electronics</a></li>
            <li><a href="#"><i class="fa-solid fa-shirt"></i> Fashion</a></li>
            <li><a href="#"><i class="fa-solid fa-laptop"></i> Computing</a></li>
            <li><a href="#"><i class="fa-solid fa-house-chimney"></i> Home & Office</a></li>
            <li><a href="#"><i class="fa-solid fa-baby-carriage"></i> Baby Products</a></li>
            <li><a href="#"><i class="fa-solid fa-gamepad"></i> Gaming</a></li>
        </ul>
    </aside>

    <div class="content-area">
        
        <section class="hero-banner">
            <div class="banner-box">
                <h1>FLASH SALES</h1>
                <p>Up to 50% Off on Top Tech Brands</p>
                <button class="shop-now">SHOP NOW</button>
            </div>
        </section>

        <section class="product-section">
            <div class="section-header">
                <h2>Top Selling Items</h2>
                <a href="#" class="see-all">See All ></a>
            </div>
            <div class="product-grid">
                <div class="product-card">
                    <div class="badge">-15%</div>
                    <img src="https://via.placeholder.com/200" alt="Product">
                    <div class="info">
                        <h3>Infinix Hot 12 - 128GB - Black</h3>
                        <p class="price">₵ 1,250.00</p>
                        <p class="old-price">₵ 1,470.00</p>
                    </div>
                    <button class="add-to-cart">ADD TO CART</button>
                </div>
                </div>
        </section>

    </div>
</div>
</body>
</html>
