<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obasty | Universal App</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <div class="app-shell">
        
        <header class="app-header">
            <div class="top-row">
                <h1 class="logo">Obasty<span>.</span></h1>
                <div class="header-btns">
                    <i class='bx bx-bell'></i>
                    <i class='bx bx-cart-alt'></i>
                </div>
            </div>
            <div class="search-box">
                <i class='bx bx-search'></i>
                <input type="text" placeholder="Search services...">
            </div>
        </header>

        <main class="app-content">
            <div class="category-scroll">
                <span class="chip active">All</span>
                <span class="chip">Logos</span>
                <span class="chip">IT Setup</span>
                <span class="chip">Hardware</span>
                <span class="chip">Lessons</span>
            </div>

            <div class="feed-grid">
                <div class="feed-card">
                    <div class="card-img">
                        <img src="https://via.placeholder.com/400x400" alt="Design">
                        <div class="price-tag">GH₵ 80</div>
                    </div>
                    <div class="card-body">
                        <h3>Professional Logo Design</h3>
                        <p>High-quality branding for your business.</p>
                        <button class="action-btn">Order Now</button>
                    </div>
                </div>

                <div class="feed-card">
                    <div class="card-img">
                        <img src="https://via.placeholder.com/400x400" alt="ICT">
                        <div class="price-tag">GH₵ 50</div>
                    </div>
                    <div class="card-body">
                        <h3>Windows 11 Installation</h3>
                        <p>Clean setup with all drivers included.</p>
                        <button class="action-btn">Book Service</button>
                    </div>
                </div>
            </div>
        </main>

        <nav class="bottom-bar">
            <a href="#" class="nav-item active"><i class='bx bxs-home-circle'></i></a>
            <a href="#" class="nav-item"><i class='bx bx-category'></i></a>
            <a href="#" class="nav-item plus"><i class='bx bx-plus'></i></a>
            <a href="#" class="nav-item"><i class='bx bx-message-square-detail'></i></a>
            <a href="#" class="nav-item"><i class='bx bx-user'></i></a>
        </nav>

    </div>

</body>
</html>
