<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickTrade | Buy & Sell Anything</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <style>
    /* 1. Hide scrollbar for the Category chips */
    .no-scrollbar::-webkit-scrollbar {
        display: none;
    }
    .no-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
    }

    /* 2. Custom Smooth Scrolling */
    html {
        scroll-behavior: smooth;
    }

    /* 3. Style the "Phone" container for PC monitors */
    @media (min-width: 768px) {
        body {
            background-color: #1a1a1a; /* Dark background outside the 'phone' */
            display: flex;
            justify-content: center;
        }
    }
</style>
</head>
<body class="bg-gray-900 font-sans flex justify-center">

    <div class="w-full max-w-[450px] bg-gray-50 min-h-screen shadow-2xl relative">

        <nav class="bg-white shadow-sm sticky top-0 z-50 px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-600">QuickTrade</h1>
            <button class="bg-blue-600 text-white p-2 rounded-full hover:bg-blue-700 transition">
                <i class="fas fa-plus"></i>
            </button>
        </nav>

        <header class="bg-blue-600 py-10 px-6">
            <div class="text-center">
                <h2 class="text-2xl font-extrabold text-white mb-6">Buy and Sell Near You</h2>
                <div class="flex bg-white rounded-lg overflow-hidden shadow-lg">
                    <input type="text" placeholder="Search..." class="w-full px-4 py-3 outline-none text-gray-700 text-sm">
                    <button class="bg-yellow-400 text-gray-900 px-4 py-3 font-bold hover:bg-yellow-500">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
            </div>
        </header>

        <section class="px-4 py-8">
            <h3 class="text-lg font-bold mb-4 text-gray-800">Categories</h3>
            <div class="flex space-x-3 overflow-x-auto pb-4 no-scrollbar">
                <div class="min-w-[100px] bg-white p-4 rounded-xl shadow-sm text-center border border-gray-100 flex-shrink-0">
                    <i class="fas fa-car text-xl text-blue-500 mb-2"></i>
                    <p class="text-xs font-semibold">Vehicles</p>
                </div>
                <div class="min-w-[100px] bg-white p-4 rounded-xl shadow-sm text-center border border-gray-100 flex-shrink-0">
                    <i class="fas fa-mobile-alt text-xl text-green-500 mb-2"></i>
                    <p class="text-xs font-semibold">Electronics</p>
                </div>
                <div class="min-w-[100px] bg-white p-4 rounded-xl shadow-sm text-center border border-gray-100 flex-shrink-0">
                    <i class="fas fa-palette text-xl text-orange-500 mb-2"></i>
                    <p class="text-xs font-semibold">Designs</p>
                </div>
            </div>
        </section>

        <main class="px-4 py-4 pb-24">
            <h3 class="text-lg font-bold mb-6 text-gray-800">Fresh Recommendations</h3>
            <div class="grid grid-cols-1 gap-6">
                
                <div class="bg-white rounded-xl overflow-hidden shadow-sm border border-gray-200">
                    <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500" alt="Product" class="h-48 w-full object-cover">
                    <div class="p-4">
                        <h4 class="text-lg font-bold text-blue-600 mb-1">$150.00</h4>
                        <p class="text-gray-700 text-sm font-medium">Premium Wireless Headphones</p>
                        <div class="flex justify-between items-center mt-4 text-xs text-gray-400">
                            <span>Winneba</span>
                            <span>2 days ago</span>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-xl overflow-hidden shadow-sm border border-gray-200">
                    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500" alt="Product" class="h-48 w-full object-cover">
                    <div class="p-4">
                        <h4 class="text-lg font-bold text-blue-600 mb-1">$85.00</h4>
                        <p class="text-gray-700 text-sm font-medium">Modern Smart Watch</p>
                        <div class="flex justify-between items-center mt-4 text-xs text-gray-400">
                            <span>Accra</span>
                            <span>5 hours ago</span>
                        </div>
                    </div>
                </div>

            </div>
        </main>

        <nav class="fixed bottom-0 w-full max-w-[450px] bg-white border-t border-gray-200 py-3 flex justify-around items-center z-50">
            <a href="#" class="text-blue-600"><i class="fas fa-home text-xl"></i></a>
            <a href="#" class="text-gray-400"><i class="fas fa-search text-xl"></i></a>
            <a href="#" class="text-gray-400"><i class="fas fa-heart text-xl"></i></a>
            <a href="#" class="text-gray-400"><i class="fas fa-user text-xl"></i></a>
        </nav>

    </div>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

</body>
</body>
</html>
